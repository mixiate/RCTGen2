name: Rust

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  EMBREE_VERSION: '4.4.1'

jobs:
  format-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check cargo fmt
        run: cargo fmt --check

  clippy-check:
    needs: format-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

  build-windows:
    needs: clippy-check
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
    - name: Download Embree
      run: gh release download --repo RenderKit/embree v$env:EMBREE_VERSION
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract Embree
      run: 7z x embree-$env:EMBREE_VERSION.x64.windows.zip
    - name: Add Embree to path
      run: |
        echo "LIB=${{ github.workspace }}/embree-$env:EMBREE_VERSION.x64.windows/lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "${{ github.workspace }}/embree-$env:EMBREE_VERSION.x64.windows/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    - name: Build
      run: cargo build --release
    - name: Run tests
      run: cargo test --release

  build-macos:
    needs: clippy-check
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Download Embree
      run: gh release download --repo RenderKit/embree v$EMBREE_VERSION
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract Embree
      run: 7z x embree-$EMBREE_VERSION.arm64.macosx.zip -o"${{ github.workspace }}/embree-$EMBREE_VERSION.arm64.macosx"
    - name: Add Embree to path
      run: |
        echo "LIBRARY_PATH=${{ github.workspace }}/embree-$EMBREE_VERSION.arm64.macosx/lib" >> $GITHUB_ENV
        echo "DYLD_FALLBACK_LIBRARY_PATH=${{ github.workspace }}/embree-$EMBREE_VERSION.arm64.macosx/lib" >> $GITHUB_ENV
    - name: Build
      run: cargo build --release
    - name: Run tests
      run: cargo test --release

  build-linux:
    needs: clippy-check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Download Embree
      run: gh release download --repo RenderKit/embree v$EMBREE_VERSION
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract Embree
      run: |
        mkdir "${{ github.workspace }}/embree-$EMBREE_VERSION.x86_64.linux"
        tar -xzf embree-$EMBREE_VERSION.x86_64.linux.tar.gz -C "${{ github.workspace }}/embree-$EMBREE_VERSION.x86_64.linux"
    - name: Add Embree to path
      run: |
        echo "LIBRARY_PATH=${{ github.workspace }}/embree-$EMBREE_VERSION.x86_64.linux/lib64" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=${{ github.workspace }}/embree-$EMBREE_VERSION.x86_64.linux/lib64" >> $GITHUB_ENV
    - name: Build
      run: cargo build --release
    - name: Run tests
      run: cargo test --release
