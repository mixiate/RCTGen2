[workspace]
members = ["embree", "renderer", "test-render"]
resolver = "3"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
borrow_as_ptr = "warn"
cast_lossless = "warn"
elidable_lifetime_names = "warn"
get_unwrap = "warn"
ptr_as_ptr = "warn"
redundant_type_annotations = "warn"
unseparated_literal_suffix = "warn"
unused_trait_names = "warn"
